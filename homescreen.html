<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RoksVOD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body {
  height:100%;
  overflow:hidden;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:black;
}

/* WALLPAPER */
#wallpaper {
  position:fixed;
  inset:0;
  background:#000 center/cover no-repeat;
  z-index:0;
}

/* BLUR (iOS depth) */
#blur {
  position:fixed;
  inset:0;
  backdrop-filter:blur(40px);
  background:rgba(0,0,0,0.35);
  z-index:1;
}

/* LOCKSCREEN */
#lockscreen {
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
}

/* TIME */
#time {
  position:absolute;
  top:80px;
  font-size:56px;
  font-weight:600;
}

/* DOTS */
#dots {
  display:flex;
  gap:12px;
  margin-bottom:20px;
}
.dot {
  width:14px;
  height:14px;
  border-radius:50%;
  border:2px solid white;
}
.dot.filled { background:white; }

/* KEYPAD */
#keypad {
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:18px;
}
.key {
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}
.key:active { transform:scale(0.9); }

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-10px)}
  50%{transform:translateX(10px)}
  75%{transform:translateX(-10px)}
  100%{transform:translateX(0)}
}

/* HOME */
#home {
  position:relative;
  z-index:2;
  display:flex;
  gap:20px;
  padding:30px;
  flex-wrap:wrap;
}
.app {
  width:70px;
  text-align:center;
  color:white;
}
.app img {
  width:64px;
  border-radius:18px;
}

/* WINDOWS */
.window {
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  backdrop-filter:blur(30px);
  background:rgba(0,0,0,0.7);
  color:white;
}
.header {
  padding:12px;
}
.back {
  color:#0a84ff;
  cursor:pointer;
}

/* SETTINGS */
select, input {
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}
button {
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
  background:#0a84ff;
  color:white;
}
</style>
</head>
<body>

<!-- WALLPAPER -->
<div id="wallpaper"></div>
<div id="blur"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
  <div id="time"></div>
  <div id="dots"></div>
  <div id="keypad"></div>
</div>

<!-- HOME -->
<div id="home"></div>

<!-- SETTINGS -->
<div id="settings" class="window">
  <div class="header">
    <span class="back" onclick="goHome()">‹ Home</span>
  </div>

  <h2 style="padding:10px;">Settings</h2>

  <h3 style="padding:10px;">Wallpaper</h3>
  <input type="file" accept="image/*" onchange="setWallpaper(this)">

  <h3 style="padding:10px;">Change Passcode</h3>

  <input id="oldPass" placeholder="Current Passcode">
  <input id="newPass" placeholder="New Passcode">

  <select id="type">
    <option value="4">4-Digit Numeric Code</option>
    <option value="6">6-Digit Numeric Code</option>
    <option value="num">Custom Numeric Code</option>
    <option value="text">Custom Alphanumeric Code</option>
  </select>

  <button onclick="changePass()">Save</button>
</div>

<script>
/* TIME */
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* WALLPAPER LOAD */
if(localStorage.wallpaper){
  document.getElementById("wallpaper").style.backgroundImage =
    `url(${localStorage.wallpaper})`;
}

/* SET WALLPAPER */
function setWallpaper(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const data = e.target.result;
    document.getElementById("wallpaper").style.backgroundImage = `url(${data})`;
    localStorage.wallpaper = data;
  };
  reader.readAsDataURL(file);
}

/* PASS SYSTEM */
let passData = JSON.parse(localStorage.passData || "null");
if(!passData){
  passData = { pass:"1234", type:"4" };
  localStorage.passData = JSON.stringify(passData);
}

/* DOTS */
let inputCode="";
function renderDots(){
  const dots=document.getElementById("dots");
  dots.innerHTML="";
  let len = passData.type==="4"?4:
            passData.type==="6"?6:
            inputCode.length;

  for(let i=0;i<len;i++){
    let d=document.createElement("div");
    d.className="dot";
    if(i<inputCode.length) d.classList.add("filled");
    dots.appendChild(d);
  }
}

/* KEYPAD */
[1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
  const btn=document.createElement("div");
  btn.className="key";
  btn.innerText=k;

  btn.onclick=()=>{
    if(k==="⌫"){
      inputCode=inputCode.slice(0,-1);
    } else if(k!==""){
      inputCode+=k;
    }
    renderDots();
    check();
  };

  document.getElementById("keypad").appendChild(btn);
});

/* CHECK */
function check(){
  if(
    (passData.type==="4" && inputCode.length===4) ||
    (passData.type==="6" && inputCode.length===6) ||
    (passData.type==="num" && inputCode.length>=1)
  ){
    if(inputCode===passData.pass){
      unlock();
    } else {
      wrong();
    }
  }
}

/* UNLOCK */
function unlock(){
  document.getElementById("lockscreen").style.opacity="0";
  setTimeout(()=>{
    document.getElementById("lockscreen").style.display="none";
  },300);
}

/* WRONG */
function wrong(){
  inputCode="";
  renderDots();
  const d=document.getElementById("dots");
  d.style.animation="shake 0.4s";
  if(navigator.vibrate) navigator.vibrate(100);
  setTimeout(()=>d.style.animation="",400);
}

/* CHANGE PASS */
function changePass(){
  const oldP=document.getElementById("oldPass").value;
  const newP=document.getElementById("newPass").value;
  const type=document.getElementById("type").value;

  if(oldP!==passData.pass) return alert("Wrong passcode");

  if(type==="4" && newP.length!==4) return alert("Must be 4 digits");
  if(type==="6" && newP.length!==6) return alert("Must be 6 digits");

  passData={pass:newP,type:type};
  localStorage.passData=JSON.stringify(passData);

  alert("Updated!");
  goHome();
}

/* HOME */
const apps=[{name:"Settings",id:"settings",icon:"https://i.imgur.com/crghH6U.png"}];

apps.forEach(a=>{
  const el=document.createElement("div");
  el.className="app";
  el.innerHTML=`<img src="${a.icon}"><div>${a.name}</div>`;
  el.onclick=()=>openApp(a.id);
  document.getElementById("home").appendChild(el);
});

function openApp(id){
  document.querySelectorAll(".window").forEach(w=>w.style.display="none");
  document.getElementById(id).style.display="flex";
}

function goHome(){
  document.querySelectorAll(".window").forEach(w=>w.style.display="none");
}

/* INIT */
renderDots();
</script>

</body>
</html>
