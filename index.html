<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English ↔ Rokla Translator</title>

<style>
:root {
  --bg: #f4f4f9;
  --text: #333;
  --card: #ffffff;
  --accent: #4f8cff;
}

body.dark {
  --bg: #121212;
  --text: #eee;
  --card: #1e1e1e;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  margin: 20px;
  transition: 0.3s;
}

.container {
  max-width: 600px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 100px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: var(--card);
  color: var(--text);
}

.output {
  background: var(--card);
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  min-height: 50px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: var(--accent);
  color: white;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.learn-box {
  margin-top: 20px;
  padding: 10px;
  background: var(--card);
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<h2>Rokla Translator</h2>
<button onclick="toggleTheme()">🌙 Toggle</button>
</div>

<select id="translationDirection">
<option value="englishToRokla">English → Rokla</option>
<option value="roklaToEnglish">Rokla → English</option>
</select>

<textarea id="englishInput" placeholder="Type here..."></textarea>

<div class="output" id="translationOutput">Translation appears here...</div>

<button onclick="copyText()">Copy</button>

<!-- Learning Section -->
<div class="learn-box">
<h3>🧠 Learn Rokla</h3>
<p id="learnPrompt">Press start to learn!</p>
<button onclick="newQuestion()">Start / Next</button>
<input id="learnInput" placeholder="Type answer...">
<button onclick="checkAnswer()">Check</button>
<p id="learnResult"></p>
</div>

</div>

<script>
const roklaAlphabet = {
a:"oje",b:"tiki",c:"ruv",d:"pax",e:"lin",
f:"zaf",g:"muk",h:"xen",i:"vri",j:"kuy",
k:"woj",l:"dor",m:"fet",n:"gap",o:"hue",
p:"jol",q:"qat",r:"sin",s:"bol",t:"mir",
u:"vek",v:"xar",w:"tum",x:"zil",y:"poe",
z:"vab"
};

const englishAlphabet = Object.fromEntries(
Object.entries(roklaAlphabet).map(([k,v])=>[v,k])
);

function englishToRokla(input){
return input.split("").map(c=>{
if(roklaAlphabet[c.toLowerCase()]){
let t=roklaAlphabet[c.toLowerCase()];
return c===c.toUpperCase()?t.toUpperCase():t;
}
return c;
}).join("");
}

function roklaToEnglish(input){
let words=input.split(/(\W+)/);
return words.map(w=>englishAlphabet[w.toLowerCase()]||w).join("");
}

const input=document.getElementById("englishInput");
const output=document.getElementById("translationOutput");

input.addEventListener("input",()=>{
let dir=document.getElementById("translationDirection").value;
let text=input.value.trim();

output.textContent=
dir==="englishToRokla"
?englishToRokla(text)
:roklaToEnglish(text);
});

// COPY BUTTON
function copyText(){
navigator.clipboard.writeText(output.textContent);
alert("Copied!");
}

// DARK MODE
function toggleTheme(){
document.body.classList.toggle("dark");
localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

// LEARNING MODE
let currentLetter="";
function newQuestion(){
const letters=Object.keys(roklaAlphabet);
currentLetter=letters[Math.floor(Math.random()*letters.length)];
document.getElementById("learnPrompt").textContent=
"What is '"+currentLetter.toUpperCase()+"' in Rokla?";
document.getElementById("learnResult").textContent="";
}

function checkAnswer(){
let val=document.getElementById("learnInput").value.trim().toLowerCase();
if(val===roklaAlphabet[currentLetter]){
document.getElementById("learnResult").textContent="✅ Correct!";
}else{
document.getElementById("learnResult").textContent=
"❌ Correct answer: "+roklaAlphabet[currentLetter];
}
}
</script>

</body>
</html>
