<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokla Translator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #0a0a0a;
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.12);
  --text-main: #ffffff;
  --text-muted: #a0a0a0;
}

body {
  background-color: var(--bg-color);
  /* Subtle grain/mesh for glass contrast */
  background-image: 
    radial-gradient(at 0% 0%, rgba(255,255,255,0.03) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(255,255,255,0.02) 0px, transparent 50%);
  color: var(--text-main);
  /* Using Inter as the primary font */
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid var(--glass-border);
  border-radius: 40px; 
  padding: 45px;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
}

h2 {
  text-align: center;
  font-weight: 600;
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 30px;
  letter-spacing: -0.02em;
}

select, textarea {
  width: 100%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  color: white;
  padding: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  margin-bottom: 20px;
  box-sizing: border-box;
  transition: all 0.2s ease;
}

textarea:focus {
  background: rgba(255, 255, 255, 0.07);
  border-color: rgba(255, 255, 255, 0.3);
}

.output-container {
  position: relative;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 24px;
  min-height: 60px;
  margin-top: 10px;
}

#outputDisplay {
  margin: 0;
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-main);
  word-wrap: break-word;
  padding-right: 75px; 
  white-space: pre-wrap;
  font-weight: 400;
}

.copy-btn {
  position: absolute;
  top: 18px;
  right: 18px;
  background: #ffffff;
  color: #000000;
  border: none;
  border-radius: 14px;
  padding: 8px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: transform 0.1s ease, opacity 0.2s;
}

.copy-btn:hover { opacity: 0.9; }
.copy-btn:active { transform: scale(0.95); }

::placeholder { color: var(--text-muted); }
select option { background: #111; color: white; }
</style>
</head>
<body>

<div class="glass-card">
  <h2>Rokla Translator</h2>

  <select id="mode">
    <option value="enToRo">English → Rokla</option>
    <option value="roToEn">Rokla → English</option>
  </select>

  <textarea id="userInput" placeholder="Type to translate..."></textarea>

  <div class="output-container">
    <div id="outputDisplay">Translation...</div>
    <button class="copy-btn" onclick="copyResult()">Copy</button>
  </div>
</div>

<script>
const roklaAlphabet = {
  a:"oje",b:"tiki",c:"ruv",d:"pax",e:"lin",f:"zaf",g:"muk",h:"xen",i:"vri",j:"kuy",
  k:"woj",l:"dor",m:"fet",n:"gap",o:"hue",p:"jol",q:"qat",r:"sin",s:"bol",t:"mir",
  u:"vek",v:"xar",w:"tum",x:"zil",y:"poe",z:"vab"
};

const engAlphabet = Object.fromEntries(Object.entries(roklaAlphabet).map(([k,v])=>[v,k]));
const roklaKeys = Object.keys(engAlphabet).sort((a,b) => b.length - a.length);

function performTranslation() {
  const input = document.getElementById("userInput").value;
  const mode = document.getElementById("mode").value;
  const out = document.getElementById("outputDisplay");

  if(!input.trim()) { out.innerText = "Translation..."; return; }

  if(mode === "enToRo") {
    out.innerText = input.split("").map(char => {
      const l = char.toLowerCase();
      if(roklaAlphabet[l]) {
        const t = roklaAlphabet[l];
        return char === char.toUpperCase() ? t.toUpperCase() : t;
      }
      return char;
    }).join("");
  } else {
    const regex = new RegExp(roklaKeys.join("|"), "gi");
    out.innerText = input.replace(regex, (m) => {
      const char = engAlphabet[m.toLowerCase()];
      return m === m.toUpperCase() ? char.toUpperCase() : char;
    });
  }
}

function copyResult() {
  const text = document.getElementById("outputDisplay").innerText;
  const btn = document.querySelector(".copy-btn");
  
  if (text === "Translation..." || text === "") return;

  // Fallback Copy Logic
  const textArea = document.createElement("textarea");
  textArea.value = text;
  document.body.appendChild(textArea);
  textArea.select();
  try {
    document.execCommand('copy');
    btn.innerText = "Copied!";
  } catch (err) {
    console.error('Copy failed', err);
  }
  document.body.removeChild(textArea);
  
  setTimeout(() => btn.innerText = "Copy", 1500);
}

document.getElementById("userInput").addEventListener("input", performTranslation);
document.getElementById("mode").addEventListener("change", performTranslation);
</script>

</body>
</html>
