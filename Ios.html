<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Top Controls */
#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10000;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

select, button {
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 8px;
  border: none;
}

/* Wrapper keeps aspect ratio centered */
#appetizeWrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  position: relative;
}

/* IMPORTANT: preserve aspect ratio */
#appetize-iframe {
  height: 100%;
  aspect-ratio: 9 / 19.5;
  border: none;
  max-width: 100%;
}

/* Fake Home Bar */
#homeBarBtn {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 6px;
  border-radius: 6px;
  background: rgba(255,255,255,0.9);
  z-index: 99999;
  pointer-events: auto;
  touch-action: manipulation;
}
</style>
</head>

<body>

<div id="controls">
  <select id="deviceSelect">
    <option value="iphone16pro">iPhone 16 Pro</option>
    <option value="iphone16promax">iPhone 16 Pro Max</option>
    <option value="iphone15pro">iPhone 15 Pro</option>
    <option value="iphone15promax">iPhone 15 Pro Max</option>
    <option value="iphone14pro">iPhone 14 Pro</option>
    <option value="iphone14promax">iPhone 14 Pro Max</option>
    <option value="iphone13pro">iPhone 13 Pro</option>
    <option value="iphone13promax">iPhone 13 Pro Max</option>
    <option value="iphone12">iPhone 12</option>
    <option value="iphone11pro" selected>iPhone 11 Pro</option>
  </select>

  <select id="osSelect">
    <option value="18.2">iOS 18.2</option>
    <option value="26.0" selected>iOS 26.0</option>
  </select>

  <button id="fullscreenBtn">Fullscreen</button>
</div>

<div id="appetizeWrapper">
  <iframe id="appetize-iframe"
          allowfullscreen
          allow="fullscreen">
  </iframe>

  <div id="homeBarBtn"></div>
</div>

<script>
(async () => {

  const iframe = document.getElementById("appetize-iframe");
  const deviceSelect = document.getElementById("deviceSelect");
  const osSelect = document.getElementById("osSelect");
  const fsBtn = document.getElementById("fullscreenBtn");
  const homeBarBtn = document.getElementById("homeBarBtn");
  const controls = document.getElementById("controls");
  const wrapper = document.getElementById("appetizeWrapper");

  let client = null;
  let session = null;

  function getURL(device, os) {
    return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=${device}&osVersion=${os}&appearance=dark&autoplay=false&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
  }

  async function waitForSDK() {
    await new Promise(resolve => {
      if (window.appetize) resolve();
      else {
        const i = setInterval(() => {
          if (window.appetize) {
            clearInterval(i);
            resolve();
          }
        }, 100);
      }
    });
  }

  async function initClient() {
    await waitForSDK();
    client = await window.appetize.getClient("#appetize-iframe");
    client.on("session", s => {
      session = s;
    });
  }

  async function loadEmulator() {
    session = null;
    iframe.src = getURL(deviceSelect.value, osSelect.value);
    await initClient();
  }

  deviceSelect.onchange = loadEmulator;
  osSelect.onchange = loadEmulator;

  await loadEmulator();

  /* HOME BAR */
  homeBarBtn.addEventListener("touchstart", async (e) => {
    e.preventDefault();
    if (!session) return;

    try {
      await session.keypress("HOME");
    } catch (err) {
      console.error("HOME failed", err);
    }
  }, { passive: false });

  /* FULLSCREEN */
  fsBtn.onclick = async () => {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    if (!isFS) {
      await wrapper.requestFullscreen?.() ||
      wrapper.webkitRequestFullscreen?.();
    } else {
      await document.exitFullscreen?.() ||
      document.webkitExitFullscreen?.();
    }
  };

  function updateUI() {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    controls.style.display = isFS ? "none" : "flex";
  }

  document.addEventListener("fullscreenchange", updateUI);
  document.addEventListener("webkitfullscreenchange", updateUI);

})();
</script>

</body>
</html>
