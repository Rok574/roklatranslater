<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Top Controls */
#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1000;
  display: flex;
  gap: 8px;
}

select, button {
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 8px;
  border: none;
}

/* Emulator wrapper */
#appetizeWrapper {
  width: 100%;
  height: 100vh;
  background: black;
  position: relative;
}

#appetize-iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Tiny Home Bar Button */
#homeBarBtn {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.6);
  z-index: 2000;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="controls">
  <select id="osSelect">
    <option value="18.2">iOS 18.2</option>
    <option value="26.0" selected>iOS 26.0</option>
  </select>
  <button id="fullscreenBtn">Fullscreen</button>
</div>

<div id="appetizeWrapper">
  <iframe id="appetize-iframe" allowfullscreen allow="fullscreen"></iframe>
</div>

<div id="homeBarBtn"></div>

<script>
(async () => {

  const iframe = document.getElementById("appetize-iframe");
  const osSelect = document.getElementById("osSelect");
  const fsBtn = document.getElementById("fullscreenBtn");
  const homeBarBtn = document.getElementById("homeBarBtn");
  const controls = document.getElementById("controls");
  const wrapper = document.getElementById("appetizeWrapper");

  let client = null;
  let session = null;

  function getURL(os) {
    return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=iphone11pro&osVersion=${os}&appearance=dark&autoplay=false&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
  }

  async function waitForSDK() {
    await new Promise(resolve => {
      if (window.appetize) resolve();
      else {
        const i = setInterval(() => {
          if (window.appetize) {
            clearInterval(i);
            resolve();
          }
        }, 100);
      }
    });
  }

  async function initClient() {
    await waitForSDK();
    client = await window.appetize.getClient("#appetize-iframe");
    client.on("session", s => {
      session = s;
    });
  }

  async function loadEmulator() {
    session = null;
    iframe.src = getURL(osSelect.value);
    await initClient();
  }

  osSelect.onchange = loadEmulator;
  await loadEmulator();

  /* -------- HOME BAR BUTTON -------- */

  homeBarBtn.onclick = async () => {
    if (!session) return;

    try {
      // Official HOME keypress (UI Automation)
      await session.keypress("HOME");
    } catch (err) {
      console.error("HOME key failed", err);
    }
  };

  /* -------- FULLSCREEN -------- */

  fsBtn.onclick = async () => {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    if (!isFS) {
      if (wrapper.requestFullscreen) {
        await wrapper.requestFullscreen();
      } else if (wrapper.webkitRequestFullscreen) {
        await wrapper.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        await document.webkitExitFullscreen();
      }
    }
  };

  function updateUI() {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    if (isFS) {
      controls.style.display = "none";   // Hide OS selector + FS button
    } else {
      controls.style.display = "flex";
    }
  }

  document.addEventListener("fullscreenchange", updateUI);
  document.addEventListener("webkitfullscreenchange", updateUI);

})();
</script>

</body>
</html>
