<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#appWrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#appetize-iframe {
  height: 100%;
  aspect-ratio: 9 / 19.5;
  border: none;
  max-width: 100%;
}

/* Home Button (Bottom Right) */
#homeButton {
  position: absolute;
  bottom: 18px;
  right: 18px;
  width: 37px;
  height: 37px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  z-index: 20;
  cursor: pointer;
  transition: transform 0.1s ease, background 0.1s ease;
}

/* Setup Overlay */
#setupOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(25px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#setupBox {
  background: rgba(30,30,30,0.95);
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  color: white;
}

.optionBtn {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
  border: none;
  background: #444;
  color: white;
  font-size: 14px;
}

.optionBtn.selected {
  background: #0a84ff;
}
</style>
</head>

<body>

<div id="setupOverlay">
  <div id="setupBox">
    <h3>Select iPhone</h3>
    <div id="deviceOptions"></div>

    <h3>Select iOS Version</h3>
    <div id="osOptions"></div>
  </div>
</div>

<div id="appWrapper">
  <iframe id="appetize-iframe"></iframe>
  <div id="homeButton"></div>
</div>

<script>
(function () {

const devices = [
  "iphone17pro","iphone17promax",
  "iphone16pro","iphone16promax",
  "iphone15pro","iphone15promax",
  "iphone14pro","iphone14promax",
  "iphone13pro","iphone13promax",
  "iphone12","iphone11pro"
];

const osVersions = ["26.0","18.2","17.2","16.2","15.5"];

let selectedDevice = null;
let selectedOS = null;
let session = null;

const deviceContainer = document.getElementById("deviceOptions");
const osContainer = document.getElementById("osOptions");
const overlay = document.getElementById("setupOverlay");
const homeBtn = document.getElementById("homeButton");

/* Build Device Buttons */
devices.forEach(d => {
  const btn = document.createElement("button");
  btn.className = "optionBtn";
  btn.textContent = d;

  btn.onclick = () => {
    selectedDevice = d;
    document.querySelectorAll("#deviceOptions .optionBtn")
      .forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
  };

  deviceContainer.appendChild(btn);
});

/* Build OS Buttons */
osVersions.forEach(v => {
  const btn = document.createElement("button");
  btn.className = "optionBtn";
  btn.textContent = v;

  btn.onclick = () => {
    selectedOS = v;
    document.querySelectorAll("#osOptions .optionBtn")
      .forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
  };

  osContainer.appendChild(btn);
});

/* Tap outside to confirm */
overlay.addEventListener("click", function () {
  if (selectedDevice && selectedOS) {
    overlay.remove();
    loadEmulator(selectedDevice, selectedOS);
  }
});

function getURL(device, os) {
  return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=${device}&osVersion=${os}&appearance=dark&audio=true&autoplay=true&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
}

function loadEmulator(device, os) {
  const iframe = document.getElementById("appetize-iframe");
  iframe.src = getURL(device, os);

  const wait = setInterval(function () {
    if (window.appetize) {
      clearInterval(wait);
      window.appetize.getClient("#appetize-iframe").then(function (client) {
        client.on("session", function (s) {
          session = s;
        });
      });
    }
  }, 100);
}

/* RESTORED SWIPE HOME LOGIC */
homeBtn.addEventListener("click", function () {

  homeBtn.style.transform = "scale(0.85)";
  homeBtn.style.background = "rgba(255,255,255,0.4)";

  setTimeout(function () {
    homeBtn.style.transform = "scale(1)";
    homeBtn.style.background = "rgba(255,255,255,0.18)";
  }, 100);

  if (!session) return;

  session.swipe({
    from: { x: 0.5, y: 0.97 },
    to:   { x: 0.5, y: 0.80 },
    duration: 200
  });

});

})();
</script>

</body>
</html>
