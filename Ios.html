<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Fullscreen button */
.controls {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 9999;
}

button {
  padding: 10px 16px;
  font-size: 14px;
  border-radius: 10px;
  border: none;
  background: rgba(20,20,20,0.9);
  color: white;
}

/* Emulator wrapper */
#appetizeWrapper {
  width: 100%;
  height: 100vh;
  background: black;
  position: relative;
}

/* TRUE fullscreen */
#appetizeWrapper:fullscreen,
#appetizeWrapper:-webkit-full-screen {
  width: 100vw !important;
  height: 100vh !important;
}

/* iframe fills entire screen */
#appetize-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>

<body>

<div class="controls" id="controls">
  <button id="fullscreenBtn">Enter Fullscreen</button>
</div>

<div id="appetizeWrapper">
  <iframe
    id="appetize-iframe"
    src="https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=iphone11pro&osVersion=26.0&appearance=dark&autoplay=false&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait"
    allow="fullscreen"
    allowfullscreen>
  </iframe>
</div>

<script>
(async () => {

  const fsBtn = document.getElementById('fullscreenBtn');
  const wrapper = document.getElementById('appetizeWrapper');
  const controls = document.getElementById('controls');

  fsBtn.onclick = async () => {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    if (!isFS) {
      if (wrapper.requestFullscreen) {
        await wrapper.requestFullscreen();
      } else if (wrapper.webkitRequestFullscreen) {
        await wrapper.webkitRequestFullscreen();
      }
    }
  };

  function updateUI() {
    const isFS =
      document.fullscreenElement ||
      document.webkitFullscreenElement;

    if (isFS) {
      controls.style.display = "none";   // Hide button
    } else {
      controls.style.display = "block";  // Show button again
    }
  }

  document.addEventListener("fullscreenchange", updateUI);
  document.addEventListener("webkitfullscreenchange", updateUI);

})();
</script>

</body>
</html>
