<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#appetizeWrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  position: relative;
}

#appetize-iframe {
  height: 100%;
  aspect-ratio: 9 / 19.5;
  border: none;
  max-width: 100%;
}

/* Swipeable Home Bar */
#homeBarBtn {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.95);
  z-index: 9999;
  transition: transform 0.15s ease;
}
</style>
</head>

<body>

<div id="appetizeWrapper">
  <iframe id="appetize-iframe"></iframe>
  <div id="homeBarBtn"></div>
</div>

<script>
(async () => {

const iframe = document.getElementById("appetize-iframe");
const homeBar = document.getElementById("homeBarBtn");
let session = null;

/* Available Devices */
const devices = [
  "iphone17pro",
  "iphone17promax",
  "iphone16pro",
  "iphone16promax",
  "iphone15pro",
  "iphone15promax",
  "iphone14pro",
  "iphone14promax",
  "iphone13pro",
  "iphone13promax",
  "iphone12",
  "iphone11pro"
];

/* Available iOS Versions */
const osVersions = [
  "26.0",
  "18.2",
  "17.2",
  "16.2",
  "15.5"
];

/* Ask Once Per Refresh */
if (!sessionStorage.getItem("deviceChoice")) {

  let deviceChoice = prompt(
    "Choose iPhone:\n\n" + devices.join("\n")
  );

  if (!devices.includes(deviceChoice)) {
    deviceChoice = "iphone11pro";
  }

  let osChoice = prompt(
    "Choose iOS Version:\n\n" + osVersions.join("\n")
  );

  if (!osVersions.includes(osChoice)) {
    osChoice = "26.0";
  }

  sessionStorage.setItem("deviceChoice", deviceChoice);
  sessionStorage.setItem("osChoice", osChoice);
}

const device = sessionStorage.getItem("deviceChoice");
const os = sessionStorage.getItem("osChoice");

function getURL(device, os) {
  return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=${device}&osVersion=${os}&appearance=dark&audio=true&autoplay=true&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
}

iframe.src = getURL(device, os);

/* Wait for SDK */
async function waitForSDK() {
  await new Promise(resolve => {
    if (window.appetize) resolve();
    else {
      const i = setInterval(() => {
        if (window.appetize) {
          clearInterval(i);
          resolve();
        }
      }, 100);
    }
  });
}

await waitForSDK();
const client = await window.appetize.getClient("#appetize-iframe");
client.on("session", s => session = s);

/* Swipe Gesture Logic */
let startY = 0;
let startTime = 0;
let deltaY = 0;

homeBar.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
  startTime = Date.now();
  deltaY = 0;
}, { passive: true });

homeBar.addEventListener("touchmove", (e) => {
  const currentY = e.touches[0].clientY;
  deltaY = startY - currentY;

  if (deltaY > 0) {
    homeBar.style.transform =
      `translateX(-50%) translateY(${Math.min(-deltaY/3, -20)}px)`;
  }
}, { passive: true });

homeBar.addEventListener("touchend", () => {
  const duration = Date.now() - startTime;

  homeBar.style.transform = "translateX(-50%)";

  // Swipe must be at least 50px upward & quick
  if (deltaY > 50 && duration < 600) {
    session?.keypress("HOME");
  } else {
    // Tap fallback
    session?.keypress("HOME");
  }
});

})();
</script>

</body>
</html>
