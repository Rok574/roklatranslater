<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 999;
}

select {
  padding: 6px;
  font-size: 14px;
}

#appetizeWrapper {
  width: 100%;
  height: 100vh;
  background: black;
  position: relative;
  touch-action: none;
}

#appetize-iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div id="controls">
  <select id="osSelect">
    <option value="18.2">iOS 18.2</option>
    <option value="26.0" selected>iOS 26.0</option>
  </select>
</div>

<div id="appetizeWrapper">
  <iframe id="appetize-iframe"
    allowfullscreen
    allow="fullscreen">
  </iframe>
</div>

<script>
(async () => {

  const iframe = document.getElementById("appetize-iframe");
  const wrapper = document.getElementById("appetizeWrapper");
  const osSelect = document.getElementById("osSelect");

  let client = null;
  let session = null;

  function getURL(os) {
    return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=iphone11pro&osVersion=${os}&appearance=dark&autoplay=false&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
  }

  async function waitForSDK() {
    await new Promise(resolve => {
      if (window.appetize) resolve();
      else {
        const i = setInterval(() => {
          if (window.appetize) {
            clearInterval(i);
            resolve();
          }
        }, 100);
      }
    });
  }

  async function init() {
    await waitForSDK();
    client = await window.appetize.getClient("#appetize-iframe");
    client.on("session", s => {
      session = s;
    });
  }

  async function loadEmulator() {
    session = null;
    iframe.src = getURL(osSelect.value);
    await init();
  }

  osSelect.onchange = loadEmulator;

  await loadEmulator();

  /* -------- SWIPE UP DETECTION -------- */

  let startY = 0;
  let startX = 0;

  wrapper.addEventListener("touchstart", e => {
    const touch = e.touches[0];
    startY = touch.clientY;
    startX = touch.clientX;
  });

  wrapper.addEventListener("touchend", async e => {
    if (!session) return;

    const touch = e.changedTouches[0];
    const endY = touch.clientY;
    const deltaY = startY - endY;

    const screenHeight = window.innerHeight;

    const startedNearBottom = startY > screenHeight * 0.85;
    const swipedUpEnough = deltaY > 80;

    if (startedNearBottom && swipedUpEnough) {
      try {
        await session.swipe({
          target: {
            position: { x: "50%", y: "95%" },
            gesture: { x: "50%", y: "10%", duration: 400 }
          }
        });
      } catch (err) {
        console.error("Swipe failed", err);
      }
    }
  });

})();
</script>

</body>
</html>
