<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<script src="https://js.appetize.io/embed.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Top Controls */
#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10000;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

select, button {
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 8px;
  border: none;
}

/* Wrapper */
#appetizeWrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  position: relative;
}

#appetize-iframe {
  height: 100%;
  aspect-ratio: 9 / 19.5;
  border: none;
  max-width: 100%;
}

/* Home Bar */
#homeBarBtn {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 6px;
  border-radius: 6px;
  background: rgba(255,255,255,0.9);
  z-index: 9999;
}

/* AssistiveTouch */
#assistiveBtn {
  position: absolute;
  right: 20px;
  bottom: 120px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.5);
  z-index: 99999;
  touch-action: none;
}

#assistiveMenu {
  position: absolute;
  right: 90px;
  bottom: 150px;
  background: rgba(30,30,30,0.95);
  padding: 12px;
  border-radius: 18px;
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 99999;
}

#assistiveMenu button {
  background: #444;
  color: white;
}
</style>
</head>

<body>

<div id="controls">
  <select id="deviceSelect">
    <option value="iphone16pro">iPhone 16 Pro</option>
    <option value="iphone16promax">iPhone 16 Pro Max</option>
    <option value="iphone15pro">iPhone 15 Pro</option>
    <option value="iphone15promax">iPhone 15 Pro Max</option>
    <option value="iphone14pro">iPhone 14 Pro</option>
    <option value="iphone14promax">iPhone 14 Pro Max</option>
    <option value="iphone13pro">iPhone 13 Pro</option>
    <option value="iphone13promax">iPhone 13 Pro Max</option>
    <option value="iphone12">iPhone 12</option>
    <option value="iphone11pro" selected>iPhone 11 Pro</option>
  </select>

  <select id="osSelect">
    <option value="18.2">iOS 18.2</option>
    <option value="26.0" selected>iOS 26.0</option>
  </select>

  <button id="fullscreenBtn">Fullscreen</button>
</div>

<div id="appetizeWrapper">
  <iframe id="appetize-iframe" allowfullscreen allow="fullscreen"></iframe>

  <div id="homeBarBtn"></div>

  <div id="assistiveBtn"></div>

  <div id="assistiveMenu">
    <button id="homeAction">Home</button>
    <button id="lockAction">Lock</button>
    <button id="volUpAction">Volume +</button>
    <button id="volDownAction">Volume -</button>
    <button id="screenshotAction">Screenshot</button>
  </div>
</div>

<script>
(async () => {

const iframe = document.getElementById("appetize-iframe");
const deviceSelect = document.getElementById("deviceSelect");
const osSelect = document.getElementById("osSelect");
const fsBtn = document.getElementById("fullscreenBtn");
const wrapper = document.getElementById("appetizeWrapper");
const controls = document.getElementById("controls");

const assistiveBtn = document.getElementById("assistiveBtn");
const assistiveMenu = document.getElementById("assistiveMenu");

let client = null;
let session = null;

function getURL(device, os) {
  return `https://appetize.io/embed/y67755zn4jbqsdr7edpx5hmv34?device=${device}&osVersion=${os}&appearance=dark&audio=true&autoplay=true&scale=auto&centered=true&xdocMsg=true&launchApp=false&screenOnly=true&orientation=portrait`;
}

async function waitForSDK() {
  await new Promise(resolve => {
    if (window.appetize) resolve();
    else {
      const i = setInterval(() => {
        if (window.appetize) {
          clearInterval(i);
          resolve();
        }
      }, 100);
    }
  });
}

async function initClient() {
  await waitForSDK();
  client = await window.appetize.getClient("#appetize-iframe");
  client.on("session", s => session = s);
}

async function loadEmulator() {
  session = null;
  iframe.src = getURL(deviceSelect.value, osSelect.value);
  await initClient();
}

deviceSelect.onchange = loadEmulator;
osSelect.onchange = loadEmulator;
await loadEmulator();

/* Home Bar */
document.getElementById("homeBarBtn").addEventListener("touchstart", e => {
  e.preventDefault();
  session?.keypress("HOME");
}, { passive:false });

/* AssistiveTouch Toggle */
assistiveBtn.onclick = () => {
  assistiveMenu.style.display =
    assistiveMenu.style.display === "flex" ? "none" : "flex";
};

/* Actions */
document.getElementById("homeAction").onclick = () => session?.keypress("HOME");
document.getElementById("lockAction").onclick = () => session?.keypress("POWER");
document.getElementById("volUpAction").onclick = () => session?.keypress("VOLUME_UP");
document.getElementById("volDownAction").onclick = () => session?.keypress("VOLUME_DOWN");
document.getElementById("screenshotAction").onclick = () => session?.keypress("SCREENSHOT");

/* Draggable AssistiveTouch */
let offsetX = 0, offsetY = 0, dragging = false;

assistiveBtn.addEventListener("touchstart", e => {
  dragging = true;
  const rect = assistiveBtn.getBoundingClientRect();
  offsetX = e.touches[0].clientX - rect.left;
  offsetY = e.touches[0].clientY - rect.top;
}, { passive:false });

assistiveBtn.addEventListener("touchmove", e => {
  if (!dragging) return;
  e.preventDefault();
  const x = e.touches[0].clientX - offsetX;
  const y = e.touches[0].clientY - offsetY;
  assistiveBtn.style.left = x + "px";
  assistiveBtn.style.top = y + "px";
  assistiveBtn.style.right = "auto";
  assistiveBtn.style.bottom = "auto";

  assistiveMenu.style.left = (x - 80) + "px";
  assistiveMenu.style.top = (y - 120) + "px";
}, { passive:false });

assistiveBtn.addEventListener("touchend", () => dragging = false);

/* Fullscreen */
fsBtn.onclick = async () => {
  const isFS = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFS) {
    await wrapper.requestFullscreen?.() ||
    wrapper.webkitRequestFullscreen?.();
  } else {
    await document.exitFullscreen?.() ||
    document.webkitExitFullscreen?.();
  }
};

function updateUI() {
  const isFS = document.fullscreenElement || document.webkitFullscreenElement;
  controls.style.display = isFS ? "none" : "flex";
}
document.addEventListener("fullscreenchange", updateUI);
document.addEventListener("webkitfullscreenchange", updateUI);

})();
</script>

</body>
</html>
